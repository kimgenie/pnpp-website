# Decap CMS configuration for PNP Partners
# Edit this file to add/rename/regroup fields visible to the editor.
# The `name` of each field must match the JSON key in /content.json exactly.

backend:
  name: git-gateway
  branch: main
  commit_messages:
    update: 'Update {{collection}} via CMS'

# Editorial workflow → every save is a Pull Request you can review on GitHub
# Comment this out for one-click direct publishing.
publish_mode: editorial_workflow

media_folder: "uploads"
public_folder: "/uploads"

# Reusable translatable widget (Korean + English pair)
# Decap does not support YAML anchors in some versions, so we inline each field.

collections:
  - name: site_content
    label: "Website Content"
    description: "Edit any copy on pnpp.kr. Hit 'Save' on top right when done."
    delete: false
    editor:
      preview: false
    files:
      - name: content
        label: "Homepage Content"
        file: "content.json"
        fields:

          # ─────────────────────────────────────────
          #  SITE & NAVIGATION
          # ─────────────────────────────────────────
          - { label: "Header / Logo wordmark", name: "site.logo", widget: string, hint: "The 'PNP Partners' text in the header. English only." }

          - label: "Navigation / 'About CEO' link"
            name: "nav.t0"
            widget: object
            collapsed: true
            fields:
              - { label: "Korean", name: ko, widget: string }
              - { label: "English", name: en, widget: string }
          - label: "Navigation / 'Services' link"
            name: "nav.t1"
            widget: object
